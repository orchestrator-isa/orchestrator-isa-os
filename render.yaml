services:
  - type: web
    name: orchestrator-isa-os
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd api && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./orchestrator_isa.db
    healthCheckPath: /api/health
