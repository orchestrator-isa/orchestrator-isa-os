services:
  - type: web
    name: orchestrator-isa
    env: python
    runtime: python3
    buildCommand: pip install -r requirements.txt && npm install
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    healthCheckTimeout: 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: orchestrator-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /tmp/data
      - key: NODE_ENV
        value: production
    disk:
      name: data
      mountPath: /tmp/data
      sizeGB: 1

databases:
  - name: orchestrator-db
    databaseName: orchestrator
    user: orchestrator
    plan: free
