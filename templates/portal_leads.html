<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads - Orchestrator ISA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --cyan: #00E5FF; --green: #00FF88; --dark: #0f172a; --card: #1e293b; --text: #cbd5e1; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--dark), #1a1a2e); color: white; min-height: 100vh; padding: 1.5rem; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background: rgba(0,229,255,0.08); padding: 1.5rem; border-radius: 16px; margin-bottom: 1.5rem; border-left: 4px solid var(--cyan); }
        h1 { color: var(--cyan); font-size: 1.8rem; }
        .nav { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .nav a { color: white; text-decoration: none; padding: 0.6rem 1.2rem; background: rgba(0,229,255,0.15); border-radius: 8px; border: 1px solid rgba(0,229,255,0.2); transition: all 0.3s; font-size: 0.9rem; }
        .nav a:hover { background: var(--cyan); color: var(--dark); }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .btn-add { padding: 0.8rem 1.5rem; background: var(--green); color: var(--dark); border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 1rem; transition: all 0.3s; }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,255,136,0.3); }
        .leads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.25rem; }
        .lead-card { background: rgba(30,41,59,0.7); backdrop-filter: blur(10px); border-radius: 16px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.05); border-left: 4px solid var(--cyan); transition: all 0.3s; }
        .lead-card:hover { transform: translateY(-4px); box-shadow: 0 10px 40px rgba(0,229,255,0.1); }
        .lead-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .lead-name { font-size: 1.2rem; font-weight: 700; color: var(--cyan); }
        .lead-score { background: linear-gradient(135deg, var(--cyan), var(--green)); color: var(--dark); padding: 0.3rem 0.9rem; border-radius: 20px; font-weight: 700; font-size: 0.85rem; }
        .lead-info { margin: 0.4rem 0; color: var(--text); font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
        .lead-info strong { color: #94a3b8; min-width: 80px; }
        .estado-badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .estado-prospeccion { background: rgba(251,191,36,0.2); color: #fbbf24; }
        .estado-auditoria { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .estado-propuesta { background: rgba(139,92,246,0.2); color: #a78bfa; }
        .estado-cerrado { background: rgba(0,255,136,0.2); color: var(--green); }
        .estado-mantenimiento { background: rgba(0,229,255,0.2); color: var(--cyan); }
        .estado-rechazado { background: rgba(239,68,68,0.2); color: #f87171; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: #94a3b8; grid-column: 1 / -1; }
        .loading { text-align: center; padding: 3rem; color: var(--cyan); grid-column: 1 / -1; }
        .stats-bar { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .stat-item { background: rgba(30,41,59,0.5); padding: 0.75rem 1.25rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--cyan); }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card); border-radius: 20px; padding: 2rem; max-width: 500px; width: 100%; border: 1px solid rgba(0,229,255,0.2); max-height: 90vh; overflow-y: auto; }
        .modal h2 { color: var(--cyan); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: #94a3b8; font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--cyan); }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
        .btn-primary { background: var(--cyan); color: var(--dark); font-weight: 600; flex: 1; padding: 0.75rem; border: none; border-radius: 10px; cursor: pointer; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.1); flex: 1; padding: 0.75rem; border-radius: 10px; cursor: pointer; }
        @media (max-width: 768px) { .leads-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>👥 Mis Leads</h1><p>Gestión de negocios prospectados</p></header>
        <nav class="nav">
            <a href="/portal">🏠 Inicio</a>
            <a href="/portal/dashboard">📊 Dashboard</a>
            <a href="/portal/cotizador">💰 Cotizador</a>
        </nav>
        <div class="stats-bar" id="statsBar">
            <div class="stat-item"><div class="stat-value" id="statTotal">-</div><div class="stat-label">Total</div></div>
            <div class="stat-item"><div class="stat-value" id="statCerrados">-</div><div class="stat-label">Cerrados</div></div>
            <div class="stat-item"><div class="stat-value" id="statMantenimiento">-</div><div class="stat-label">Activos</div></div>
        </div>
        <div class="toolbar">
            <div></div>
            <div class="actions">
                <button class="btn-add" onclick="openModal()">+ Nuevo Lead</button>
            </div>
        </div>
        <div id="leadsContainer" class="leads-grid"><div class="loading">⏳ Cargando...</div></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>➕ Nuevo Lead</h2>
            <form id="leadForm">
                <div class="form-group"><label>Nombre del negocio *</label><input type="text" name="nombre" required placeholder="Ej: Café Al Hizam"></div>
                <div class="form-group"><label>Tipo de negocio *</label><input type="text" name="tipo_negocio" required placeholder="Ej: Restaurante"></div>
                <div class="form-group"><label>Teléfono</label><input type="tel" name="telefono" placeholder="+212 6 XX XX XX XX"></div>
                <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="contacto@negocio.ma"></div>
                <div class="form-group"><label>Score (0-10)</label><input type="number" name="score" min="0" max="10" value="5"></div>
                <div class="form-group"><label>Pack recomendado</label>
                    <select name="pack_recomendado">
                        <option value="">Seleccionar...</option>
                        <option value="Presencia Digital">Presencia Digital (250 MAD)</option>
                        <option value="WhatsApp Pro">WhatsApp Pro (400 MAD)</option>
                        <option value="Automatización">Automatización (800 MAD)</option>
                        <option value="Pack Completo">Pack Completo (1,200 MAD)</option>
                        <option value="Base">Base - Google + WhatsApp (900 MAD)</option>
                        <option value="Conversión">Conversión - Landing + WhatsApp (2,500 MAD)</option>
                        <option value="Escala">Escala - Web Completa (8,000 MAD)</option>
                    </select>
                </div>
                <div class="form-group"><label>Estado</label>
                    <select name="estado">
                        <option value="prospeccion">Prospección</option>
                        <option value="auditoria">Auditoría</option>
                        <option value="propuesta">Propuesta</option>
                        <option value="cerrado">Cerrado</option>
                        <option value="mantenimiento">Mantenimiento</option>
                        <option value="rechazado">Rechazado</option>
                    </select>
                </div>
                <div class="form-group"><label>Ciudad</label><input type="text" name="ciudad" value="tetouan"></div>
                <div class="form-group"><label>Notas</label><textarea name="notas" placeholder="Información adicional..."></textarea></div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary">💾 Guardar</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allLeads = [];
        async function loadLeads() {
            const container = document.getElementById('leadsContainer');
            container.innerHTML = '<div class="loading">⏳ Cargando...</div>';
            try {
                const response = await fetch('/api/leads?limit=200');
                const data = await response.json();
                allLeads = data.leads || [];
                updateStats();
                renderLeads();
            } catch (error) {
                container.innerHTML = '<div class="empty-state"><h3>❌ Error de conexión</h3><button onclick="loadLeads()">🔄 Reintentar</button></div>';
            }
        }
        function updateStats() {
            document.getElementById('statTotal').textContent = allLeads.length;
            document.getElementById('statCerrados').textContent = allLeads.filter(l => l.estado === 'cerrado').length;
            document.getElementById('statMantenimiento').textContent = allLeads.filter(l => l.estado === 'mantenimiento').length;
        }
        function renderLeads() {
            const container = document.getElementById('leadsContainer');
            if (allLeads.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>📭 No hay leads</h3><button class="btn-add" onclick="openModal()">+ Crear primer lead</button></div>';
                return;
            }
            container.innerHTML = allLeads.map(lead => {
                const waNumber = (lead.telefono || '').replace(/\s/g, '').replace(/^0/, '+212');
                const estadoClass = `estado-${lead.estado}`;
                const fecha = lead.fecha_creacion ? new Date(lead.fecha_creacion).toLocaleDateString('es-MA') : '';
                return `<div class="lead-card">
                    <div class="lead-header"><div class="lead-name">${escapeHtml(lead.nombre)}</div><div class="lead-score">${lead.score || 0}/10</div></div>
                    <div class="lead-info"><strong>Tipo:</strong> ${escapeHtml(lead.tipo_negocio)}</div>
                    ${lead.telefono ? `<div class="lead-info"><strong>📞</strong> ${escapeHtml(lead.telefono)}</div>` : ''}
                    ${lead.email ? `<div class="lead-info"><strong>✉️</strong> ${escapeHtml(lead.email)}</div>` : ''}
                    ${lead.pack_recomendado ? `<div class="lead-info"><strong>📦</strong> ${escapeHtml(lead.pack_recomendado)}</div>` : ''}
                    <div class="lead-info"><strong>Estado:</strong> <span class="estado-badge ${estadoClass}">${lead.estado}</span></div>
                    ${fecha ? `<div class="lead-info"><strong>📅</strong> ${fecha}</div>` : ''}
                    ${lead.fuente ? `<div class="lead-info"><strong>🌐</strong> ${escapeHtml(lead.fuente)}</div>` : ''}
                </div>`;
            }).join('');
        }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function openModal() { document.getElementById('modalOverlay').classList.add('active'); document.getElementById('leadForm').reset(); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.score = parseInt(data.score) || 0;
            try {
                const response = await fetch('/api/leads', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (response.ok) { closeModal(); loadLeads(); }
                else { const err = await response.json(); alert('Error: ' + (err.detail || 'No se pudo crear')); }
            } catch (error) { alert('Error de conexión'); }
        });
        loadLeads();
        setInterval(loadLeads, 30000);
    </script>
</body>
</html>
