<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads - Orchestrator ISA</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cyan: #00E5FF;
            --green: #00FF88;
            --dark: #0f172a;
            --card: #1e293b;
            --text: #cbd5e1;
            --accent: #00b894;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #1a1a2e 100%);
            color: white;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: rgba(0, 229, 255, 0.08);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--cyan);
        }
        h1 { color: var(--cyan); margin-bottom: 0.5rem; font-size: 1.8rem; }
        header p { color: var(--text); }
        .nav {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            background: rgba(0, 229, 255, 0.15);
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }
        .nav a:hover { background: var(--cyan); color: var(--dark); }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.5rem 1.2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.1); }
        .filter-btn.active {
            background: var(--cyan);
            color: var(--dark);
            border-color: var(--cyan);
            font-weight: 600;
        }
        .actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn-add {
            padding: 0.6rem 1.2rem;
            background: var(--green);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,255,136,0.3); }
        .leads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.25rem;
        }
        .lead-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 4px solid var(--cyan);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .lead-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 40px rgba(0,229,255,0.1);
            border-color: rgba(0,229,255,0.3);
        }
        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .lead-name { font-size: 1.2rem; font-weight: 700; color: var(--cyan); }
        .lead-score {
            background: linear-gradient(135deg, var(--cyan), var(--green));
            color: var(--dark);
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .lead-info { 
            margin: 0.4rem 0; 
            color: var(--text); 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .lead-info strong { color: #94a3b8; min-width: 80px; }
        .lead-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn-wa { background: #25D366; color: white; }
        .btn-wa:hover { background: #128C7E; }
        .btn-detail { background: rgba(0,229,255,0.15); color: var(--cyan); border: 1px solid rgba(0,229,255,0.3); }
        .btn-detail:hover { background: var(--cyan); color: var(--dark); }
        .btn-edit { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
        .btn-edit:hover { background: rgba(255,255,255,0.1); }
        .estado-badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .estado-prospeccion { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .estado-auditoria { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .estado-propuesta { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .estado-cerrado { background: rgba(0, 255, 136, 0.2); color: var(--green); }
        .estado-mantenimiento { background: rgba(0, 229, 255, 0.2); color: var(--cyan); }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #94a3b8;
            grid-column: 1 / -1;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--cyan);
            grid-column: 1 / -1;
        }
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(30, 41, 59, 0.5);
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--cyan); }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card);
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(0,229,255,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 { color: var(--cyan); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: #94a3b8; font-size: 0.85rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--cyan);
        }
        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }
        .btn-primary { background: var(--cyan); color: var(--dark); font-weight: 600; }
        .btn-primary:hover { background: var(--green); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        @media (max-width: 768px) {
            .leads-grid { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .nav { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👥 Mis Leads</h1>
            <p>Gestión completa de negocios prospectados en Marruecos</p>
        </header>

        <nav class="nav">
            <a href="/portal">🏠 Inicio</a>
            <a href="/portal/validador">⚡ Validador</a>
            <a href="/portal/dashboard">📊 Dashboard</a>
            <a href="/portal/cotizador">💰 Cotizador</a>
        </nav>

        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-value" id="statTotal">-</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statCerrados">-</div>
                <div class="stat-label">Cerrados</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statMantenimiento">-</div>
                <div class="stat-label">Activos</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statScore">-</div>
                <div class="stat-label">Score Medio</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="filters">
                <button class="filter-btn active" data-filter="todos">Todos</button>
                <button class="filter-btn" data-filter="prospeccion">🔍 Prospección</button>
                <button class="filter-btn" data-filter="auditoria">📋 Auditoría</button>
                <button class="filter-btn" data-filter="propuesta">📄 Propuesta</button>
                <button class="filter-btn" data-filter="cerrado">✅ Cerrados</button>
                <button class="filter-btn" data-filter="mantenimiento">🔄 Activos</button>
            </div>
            <div class="actions">
                <button class="btn-add" onclick="openModal()">+ Nuevo Lead</button>
            </div>
        </div>

        <div id="leadsContainer" class="leads-grid">
            <div class="loading">⏳ Cargando leads...</div>
        </div>
    </div>

    <!-- Modal Nuevo Lead -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>➕ Nuevo Lead</h2>
            <form id="leadForm">
                <div class="form-group">
                    <label>Nombre del negocio</label>
                    <input type="text" name="nombre" required placeholder="Ej: Restaurante Al Hizam">
                </div>
                <div class="form-group">
                    <label>Tipo de negocio</label>
                    <input type="text" name="tipo_negocio" required placeholder="Ej: Restaurante, Salón de belleza...">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" name="telefono" placeholder="+212 6 XX XX XX XX">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="contacto@negocio.ma">
                </div>
                <div class="form-group">
                    <label>Score (0-10)</label>
                    <input type="number" name="score" min="0" max="10" value="5">
                </div>
                <div class="form-group">
                    <label>Pack recomendado</label>
                    <select name="pack_recomendado">
                        <option value="">Seleccionar...</option>
                        <option value="Presencia Digital">Presencia Digital</option>
                        <option value="WhatsApp Pro">WhatsApp Pro</option>
                        <option value="Automatización">Automatización</option>
                        <option value="Pack Completo">Pack Completo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select name="estado">
                        <option value="prospeccion">Prospección</option>
                        <option value="auditoria">Auditoría</option>
                        <option value="propuesta">Propuesta</option>
                        <option value="cerrado">Cerrado</option>
                        <option value="mantenimiento">Mantenimiento</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ciudad</label>
                    <input type="text" name="ciudad" value="tetouan">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">💾 Guardar Lead</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allLeads = [];
        let currentFilter = 'todos';

        async function loadLeads() {
            const container = document.getElementById('leadsContainer');
            container.innerHTML = '<div class="loading">⏳ Cargando leads...</div>';

            try {
                const response = await fetch(`/api/leads?limit=200`);
                const data = await response.json();
                allLeads = data.leads || [];
                updateStats();
                renderLeads();
            } catch (error) {
                console.error('Error cargando leads:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ Error de conexión</h3>
                        <p>No se pudieron cargar los leads. Verifica que el servidor esté corriendo.</p>
                        <button class="btn btn-primary" onclick="loadLeads()" style="margin-top:1rem">🔄 Reintentar</button>
                    </div>
                `;
            }
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allLeads.length;
            document.getElementById('statCerrados').textContent = allLeads.filter(l => l.estado === 'cerrado').length;
            document.getElementById('statMantenimiento').textContent = allLeads.filter(l => l.estado === 'mantenimiento').length;
            const avgScore = allLeads.length > 0 
                ? (allLeads.reduce((a, l) => a + (l.score || 0), 0) / allLeads.length).toFixed(1)
                : '0';
            document.getElementById('statScore').textContent = avgScore;
        }

        function renderLeads() {
            const container = document.getElementById('leadsContainer');

            const filteredLeads = currentFilter === 'todos' 
                ? allLeads 
                : allLeads.filter(lead => lead.estado === currentFilter);

            if (filteredLeads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 No hay leads</h3>
                        <p>No se encontraron leads en esta categoría.</p>
                        <button class="btn btn-add" onclick="openModal()" style="margin-top:1rem">+ Crear primer lead</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredLeads.map(lead => {
                const waNumber = (lead.telefono || '').replace(/\s/g, '').replace(/^0/, '+212');
                const estadoClass = `estado-${lead.estado}`;
                const fecha = lead.fecha_creacion 
                    ? new Date(lead.fecha_creacion).toLocaleDateString('es-MA') 
                    : '';

                return `
                    <div class="lead-card">
                        <div class="lead-header">
                            <div class="lead-name">${escapeHtml(lead.nombre)}</div>
                            <div class="lead-score">${lead.score || 0}/10</div>
                        </div>
                        <div class="lead-info">
                            <strong>Tipo:</strong> ${escapeHtml(lead.tipo_negocio)}
                        </div>
                        ${lead.telefono ? `<div class="lead-info"><strong>📞</strong> ${escapeHtml(lead.telefono)}</div>` : ''}
                        ${lead.email ? `<div class="lead-info"><strong>✉️</strong> ${escapeHtml(lead.email)}</div>` : ''}
                        ${lead.pack_recomendado ? `<div class="lead-info"><strong>📦</strong> ${escapeHtml(lead.pack_recomendado)}</div>` : ''}
                        <div class="lead-info">
                            <strong>Estado:</strong> 
                            <span class="estado-badge ${estadoClass}">${lead.estado}</span>
                        </div>
                        ${fecha ? `<div class="lead-info"><strong>📅</strong> ${fecha}</div>` : ''}
                        <div class="lead-actions">
                            ${lead.telefono ? `<a href="https://wa.me/${waNumber}" class="btn btn-wa" target="_blank" rel="noopener">💬 WhatsApp</a>` : ''}
                            <button class="btn btn-detail" onclick="verDetalles(${lead.id})">👁️ Ver</button>
                            <button class="btn btn-edit" onclick="editarLead(${lead.id})">✏️ Editar</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderLeads();
            });
        });

        // Modal
        function openModal() {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('leadForm').reset();
        }
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        });

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.score = parseInt(data.score) || 0;

            try {
                const response = await fetch('/api/leads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    closeModal();
                    loadLeads();
                } else {
                    const err = await response.json();
                    alert('Error: ' + (err.detail || 'No se pudo crear el lead'));
                }
            } catch (error) {
                alert('Error de conexión al guardar');
            }
        });

        function verDetalles(leadId) {
            const lead = allLeads.find(l => l.id === leadId);
            if (!lead) return;

            const detalles = Object.entries(lead)
                .map(([k, v]) => `${k}: ${v}`)
                .join('\n');
            alert(`📋 Detalles del Lead #${leadId}\n\n${detalles}`);
        }

        async function editarLead(leadId) {
            const nuevoEstado = prompt('Nuevo estado (prospeccion/auditoria/propuesta/cerrado/mantenimiento):');
            if (!nuevoEstado) return;

            try {
                const response = await fetch(`/api/leads/${leadId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado: nuevoEstado })
                });
                if (response.ok) {
                    loadLeads();
                } else {
                    alert('Error al actualizar');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }

        // Cargar leads al iniciar
        loadLeads();

        // Recargar cada 30 segundos
        setInterval(loadLeads, 30000);
    </script>
</body>
</html>
