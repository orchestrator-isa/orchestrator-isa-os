<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 Leads | IA Boost Prufer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <style>
        :root { --bg: #0B1120; --card: #151E32; --cyan: #00E5FF; --verde: #00FF88; --texto: #FFFFFF; --texto-sec: #94A3B8; --alerta: #EF4444; --border: rgba(0, 229, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; }
        .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 0.75rem; }
        .header-rocket { font-size: 1.5rem; }
        .header-brand { font-size: 1.1rem; font-weight: 700; }
        .header-brand .prufer { color: var(--cyan); }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .user-badge { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--texto-sec); }
        .user-badge .rol { background: rgba(0, 229, 255, 0.1); color: var(--cyan); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
        .btn-logout { background: transparent; border: 1px solid rgba(239, 68, 68, 0.3); color: var(--alerta); padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .nav a { color: var(--texto); text-decoration: none; padding: 0.5rem 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; transition: all 0.2s; }
        .nav a:hover, .nav a.active { background: var(--cyan); color: var(--bg); }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
        .section h2 { color: var(--cyan); margin-bottom: 1rem; font-size: 1.2rem; }
        .btn-nuevo { background: var(--verde); color: var(--bg); border: none; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 1rem; }
        .btn-nuevo:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }
        .filters { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .filters input, .filters select { padding: 0.5rem 0.75rem; background: var(--bg); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 6px; color: var(--texto); font-size: 0.9rem; }
        .lead-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .lead-table th { text-align: left; padding: 0.75rem; color: var(--texto-sec); font-weight: 600; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-transform: uppercase; }
        .lead-table td { padding: 0.75rem; border-bottom: 1px solid rgba(148, 163, 184, 0.05); }
        .lead-table tr:hover { background: rgba(0, 229, 255, 0.03); }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .badge-nuevo { background: rgba(0, 229, 255, 0.1); color: var(--cyan); }
        .badge-cerrado { background: rgba(0, 255, 136, 0.1); color: var(--verde); }
        .badge-auditoria { background: rgba(234, 179, 8, 0.1); color: #EAB308; }
        .btn-action { padding: 0.3rem 0.6rem; background: rgba(0, 229, 255, 0.1); color: var(--cyan); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 4px; font-size: 0.75rem; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-action:hover { background: rgba(0, 229, 255, 0.2); }
        .loading { text-align: center; padding: 2rem; color: var(--cyan); }
        .error { text-align: center; padding: 2rem; color: var(--alerta); }
        .empty { text-align: center; padding: 3rem; color: var(--texto-sec); }
        @media (max-width: 768px) {
            .lead-table { display: block; overflow-x: auto; }
            .header-brand { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="header-rocket">🚀</span>
            <div class="header-brand">IA Boost <span class="prufer">Prufer</span></div>
        </div>
        <div class="header-right">
            <div class="user-badge">
                <span>👤 {{ user.nombre_display }}</span>
                <span class="rol">{{ user.rol }}</span>
            </div>
            <form method="POST" action="/auth/logout" style="margin:0">
                <button type="submit" class="btn-logout">Salir</button>
            </form>
        </div>
    </header>

    <div class="container">
        <div class="nav">
            <a href="/portal">🏠 Inicio</a>
            <a href="/portal/leads" class="active">👥 Leads</a>
            <a href="/portal/dashboard">📊 Dashboard</a>
            <a href="/portal/validador">⚡ Validador</a>
            <a href="/vendedor/venta">🎯 Venta</a>
        </div>

        <div class="section">
            <h2>👥 Mis Leads</h2>
            <button class="btn-nuevo" onclick="window.location.href='/portal/validador'">+ Nuevo Lead</button>

            <div class="filters">
                <input type="text" id="search" placeholder="🔍 Buscar..." oninput="filtrar()">
                <select id="filterEstado" onchange="filtrar()">
                    <option value="">Todos los estados</option>
                    <option value="nuevo">Nuevo</option>
                    <option value="auditoria">Auditoría</option>
                    <option value="cerrado">Cerrado</option>
                    <option value="mantenimiento">Mantenimiento</option>
                </select>
            </div>

            <div id="loading" class="loading">⏳ Cargando leads...</div>
            <div id="error" class="error" style="display:none">❌ Error de conexión. <button onclick="cargarLeads()" style="background:var(--cyan);color:var(--bg);border:none;padding:0.5rem 1rem;border-radius:6px;cursor:pointer;margin-top:0.5rem">Reintentar</button></div>
            <div id="empty" class="empty" style="display:none">📭 No hay leads registrados</div>

            <div style="overflow-x:auto">
                <table class="lead-table" id="leadTable" style="display:none">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Negocio</th>
                            <th>Teléfono</th>
                            <th>Ciudad</th>
                            <th>Estado</th>
                            <th>Score</th>
                            <th>Caso</th>
                            <th>Creado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="leadBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allLeads = [];

        async function cargarLeads() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('empty').style.display = 'none';
            document.getElementById('leadTable').style.display = 'none';

            try {
                const res = await fetch('/api/leads?limit=500');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                allLeads = await res.json();
                renderizar(allLeads);
            } catch (e) {
                console.error(e);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        function renderizar(leads) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            if (leads.length === 0) {
                document.getElementById('empty').style.display = 'block';
                document.getElementById('leadTable').style.display = 'none';
                return;
            }

            const tbody = document.getElementById('leadBody');
            tbody.innerHTML = leads.map(l => {
                const estadoClass = l.estado === 'nuevo' ? 'badge-nuevo' : l.estado === 'cerrado' ? 'badge-cerrado' : 'badge-auditoria';
                const fecha = new Date(l.fecha_creacion).toLocaleDateString('es-ES');
                return `<tr>
                    <td>#${l.id}</td>
                    <td><strong>${l.nombre}</strong><br><small style="color:var(--texto-sec)">${l.tipo_negocio}</small></td>
                    <td>${l.telefono}</td>
                    <td>${l.ciudad}</td>
                    <td><span class="badge ${estadoClass}">${l.estado}</span></td>
                    <td>${l.score > 0 ? l.score + '/10' : '-'}</td>
                    <td>${l.caso || '-'}</td>
                    <td>${fecha}</td>
                    <td><a href="/vendedor/venta?lead=${l.id}" class="btn-action">Vender →</a></td>
                </tr>`;
            }).join('');

            document.getElementById('leadTable').style.display = 'table';
        }

        function filtrar() {
            const search = document.getElementById('search').value.toLowerCase();
            const estado = document.getElementById('filterEstado').value;
            const filtrados = allLeads.filter(l => {
                const matchSearch = !search || l.nombre.toLowerCase().includes(search) || l.telefono.includes(search);
                const matchEstado = !estado || l.estado === estado;
                return matchSearch && matchEstado;
            });
            renderizar(filtrados);
        }

        document.addEventListener('DOMContentLoaded', cargarLeads);
    </script>
</body>
</html>
