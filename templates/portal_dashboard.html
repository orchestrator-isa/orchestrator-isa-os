<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard | IA Boost Prufer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <style>
        :root { --bg: #0B1120; --card: #151E32; --cyan: #00E5FF; --verde: #00FF88; --texto: #FFFFFF; --texto-sec: #94A3B8; --alerta: #EF4444; --border: rgba(0, 229, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; }
        .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 0.75rem; }
        .header-rocket { font-size: 1.5rem; }
        .header-brand { font-size: 1.1rem; font-weight: 700; }
        .header-brand .prufer { color: var(--cyan); }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .user-badge { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--texto-sec); }
        .user-badge .rol { background: rgba(0, 229, 255, 0.1); color: var(--cyan); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
        .btn-logout { background: transparent; border: 1px solid rgba(239, 68, 68, 0.3); color: var(--alerta); padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .nav a { color: var(--texto); text-decoration: none; padding: 0.5rem 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; transition: all 0.2s; }
        .nav a:hover, .nav a.active { background: var(--cyan); color: var(--bg); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; }
        .kpi-value { font-size: 2rem; font-weight: 800; color: var(--cyan); }
        .kpi-label { color: var(--texto-sec); font-size: 0.85rem; margin-top: 0.25rem; }
        .kpi-card.verde .kpi-value { color: var(--verde); }
        .kpi-card.alerta .kpi-value { color: var(--alerta); }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
        .section h2 { color: var(--cyan); margin-bottom: 1rem; font-size: 1.2rem; }
        .loading { text-align: center; padding: 2rem; color: var(--cyan); }
        .error { text-align: center; padding: 2rem; color: var(--alerta); }
        @media (max-width: 768px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="header-rocket">🚀</span>
            <div class="header-brand">IA Boost <span class="prufer">Prufer</span></div>
        </div>
        <div class="header-right">
            <div class="user-badge">
                <span>👤 {{ user.nombre_display }}</span>
                <span class="rol">{{ user.rol }}</span>
            </div>
            <form method="POST" action="/auth/logout" style="margin:0">
                <button type="submit" class="btn-logout">Salir</button>
            </form>
        </div>
    </header>

    <div class="container">
        <div class="nav">
            <a href="/portal">🏠 Inicio</a>
            <a href="/portal/leads">👥 Leads</a>
            <a href="/portal/dashboard" class="active">📊 Dashboard</a>
            <a href="/portal/validador">⚡ Validador</a>
            <a href="/vendedor/venta">🎯 Venta</a>
        </div>

        <div class="kpi-grid" id="kpiGrid">
            <div class="kpi-card"><div class="kpi-value" id="kpiTotal">—</div><div class="kpi-label">Total Leads</div></div>
            <div class="kpi-card"><div class="kpi-value" id="kpiNuevos">—</div><div class="kpi-label">Nuevos</div></div>
            <div class="kpi-card verde"><div class="kpi-value" id="kpiCerrados">—</div><div class="kpi-label">Ventas Cerradas</div></div>
            <div class="kpi-card alerta"><div class="kpi-value" id="kpiRenovaciones">—</div><div class="kpi-label">Renovaciones 7d</div></div>
            <div class="kpi-card"><div class="kpi-value" id="kpiPotencial">—</div><div class="kpi-label">Ingresos Potenciales (MAD)</div></div>
            <div class="kpi-card verde"><div class="kpi-value" id="kpiCerradosMAD">—</div><div class="kpi-label">Ingresos Cerrados (MAD)</div></div>
        </div>

        <div class="section">
            <h2>📈 Rendimiento</h2>
            <div id="loading" class="loading">⏳ Cargando métricas...</div>
            <div id="error" class="error" style="display:none">❌ Error cargando datos</div>
        </div>
    </div>

    <script>
        async function cargarDashboard() {
            try {
                const res = await fetch('/api/dashboard');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                document.getElementById('kpiTotal').textContent = data.total_leads || 0;
                document.getElementById('kpiNuevos').textContent = data.leads_nuevos || 0;
                document.getElementById('kpiCerrados').textContent = data.leads_cerrados || 0;
                document.getElementById('kpiRenovaciones').textContent = data.renovaciones_7d || 0;
                document.getElementById('kpiPotencial').textContent = (data.ingresos_potenciales || 0).toLocaleString();
                document.getElementById('kpiCerradosMAD').textContent = (data.ingresos_cerrados || 0).toLocaleString();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }
        document.addEventListener('DOMContentLoaded', cargarDashboard);
    </script>
</body>
</html>
