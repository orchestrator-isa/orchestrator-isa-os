<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🚀 Orchestrator ISA - Validador</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00b894;
            --primary-dark: #00a383;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            padding: 25px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .header p { font-size: 0.85rem; opacity: 0.9; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .radio-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .radio-option {
            position: relative;
        }
        .radio-option input {
            position: absolute;
            opacity: 0;
        }
        .radio-option label {
            display: block;
            padding: 12px 8px;
            text-align: center;
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .radio-option input:checked + label {
            border-color: var(--primary);
            background: rgba(0, 184, 148, 0.1);
            color: var(--primary);
        }
        .radio-option label:hover {
            border-color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary {
            background: var(--card);
            color: var(--text);
            border: 2px solid var(--border);
        }
        .resultado {
            display: none;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }
        .score-label {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .score-detail {
            background: var(--bg);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .pack-recomendado {
            background: linear-gradient(135deg, rgba(0,184,148,0.1) 0%, rgba(0,206,201,0.1) 100%);
            border: 2px solid var(--primary);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
        }
        .pack-name { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
        .pack-price { font-size: 2.2rem; font-weight: bold; margin: 10px 0; }
        .pack-mes { color: var(--text-muted); font-size: 0.9rem; }
        .speech-box {
            background: var(--bg);
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 0 10px 10px 0;
            margin: 15px 0;
            font-style: italic;
            font-size: 0.95rem;
        }
        .accion-tag {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin: 10px 0;
        }
        .accion-ideal { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .accion-bueno { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .accion-basico { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .btn-cotizar {
            background: var(--success);
            color: white;
            margin-top: 15px;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .nav-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item span { display: block; font-size: 1.4rem; margin-bottom: 2px; }
        .hidden { display: none !important; }
        .leads-list { max-height: 60vh; overflow-y: auto; }
        .lead-item {
            background: var(--bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .lead-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .lead-name { font-weight: 600; font-size: 1rem; }
        .lead-score {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .lead-info { font-size: 0.8rem; color: var(--text-muted); }
        .lead-estado {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-top: 8px;
        }
        .estado-prospeccion { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .estado-cerrado { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .estado-mantenimiento { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .kpi-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .kpi-value { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        .kpi-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Orchestrator ISA</h1>
        <p>Validador de Negocios v2.0</p>
    </div>

    <!-- PANTALLA 1: VALIDADOR -->
    <div id="pantalla-validador" class="container">
        <div class="card">
            <div class="card-title">📍 Información del Negocio</div>
            <div class="form-group">
                <label class="form-label">Nombre del Negocio</label>
                <input type="text" id="nombre_negocio" class="form-input" placeholder="Ej: Panadería Al Hizam">
            </div>
            <div class="form-group">
                <label class="form-label">Tipo de Negocio</label>
                <select id="tipo_negocio" class="form-select">
                    <option value="">Seleccionar...</option>
                    <option value="clinica_dental">🦷 Clínica Dental</option>
                    <option value="salon_belleza">💇‍♀️ Salón de Belleza</option>
                    <option value="restaurante">🍽️ Restaurante</option>
                    <option value="cafe">☕ Café</option>
                    <option value="consultorio_medico">🩺 Consultorio Médico</option>
                    <option value="taller_mecanico">🔧 Taller Mecánico</option>
                    <option value="farmacia">💊 Farmacia</option>
                    <option value="gimnasio">🏋️‍♂️ Gimnasio</option>
                    <option value="academia_idiomas">🗣️ Academia de Idiomas</option>
                    <option value="panaderia">🥐 Panadería</option>
                    <option value="inmobiliaria">🏠 Inmobiliaria</option>
                    <option value="otro">📦 Otro</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Nombre del Dueño (opcional)</label>
                <input type="text" id="nombre_dueno" class="form-input" placeholder="Ej: Ahmed">
            </div>
            <div class="form-group">
                <label class="form-label">Teléfono (opcional)</label>
                <input type="tel" id="telefono" class="form-input" placeholder="+212 6XX XXX XXX">
            </div>
        </div>

        <div class="card">
            <div class="card-title">📋 Checklist de Validación</div>

            <div class="form-group">
                <label class="form-label">1. ¿Usa WhatsApp para clientes?</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="wa" id="wa0" value="0">
                        <label for="wa0">❌ No</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="wa" id="wa1" value="1">
                        <label for="wa1">⚠️ Poco</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="wa" id="wa2" value="2" checked>
                        <label for="wa2">✅ Activo</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">2. ¿Aparece en Google Maps?</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="gm" id="gm0" value="0" checked>
                        <label for="gm0">❌ No</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="gm" id="gm1" value="1">
                        <label for="gm1">⚠️ Incompleto</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="gm" id="gm2" value="2">
                        <label for="gm2">✅ Completo</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">3. ¿+10 consultas al día?</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="q" id="q0" value="0" checked>
                        <label for="q0">❌ No</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="q" id="q1" value="1">
                        <label for="q1">✅ Sí</label>
                    </div>
                    <div class="radio-option"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">4. ¿Competidores digitalizados?</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="comp" id="comp0" value="0">
                        <label for="comp0">❌ No</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="comp" id="comp1" value="1" checked>
                        <label for="comp1">✅ Sí</label>
                    </div>
                    <div class="radio-option"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">5. ¿Dueño usa smartphone?</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="phone" id="phone0" value="0">
                        <label for="phone0">❌ No</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="phone" id="phone1" value="1">
                        <label for="phone1">⚠️ Básico</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="phone" id="phone2" value="2" checked>
                        <label for="phone2">✅ Activo</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Notas (opcional)</label>
                <textarea id="notas" class="form-input" rows="3" placeholder="Observaciones del negocio..."></textarea>
            </div>
        </div>

        <button class="btn btn-primary" onclick="validar()">
            🔍 Validar Negocio
        </button>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Analizando negocio...</p>
        </div>

        <div class="resultado" id="resultado">
            <div class="card">
                <div class="score-circle" id="score-circle">0</div>
                <div class="score-label" id="score-label">Score</div>
                <div id="score-details"></div>
            </div>

            <div class="pack-recomendado" id="pack-recomendado">
                <div class="pack-name" id="pack-name">Pack</div>
                <div class="pack-price" id="pack-price">0 MAD</div>
                <div class="pack-mes" id="pack-mes">+ 0 MAD/mes</div>
            </div>

            <div class="speech-box" id="speech-box"></div>

            <div id="accion-container"></div>

            <button class="btn btn-cotizar" onclick="generarCotizacion()">
                📄 Generar Cotización PDF
            </button>
            <button class="btn btn-secondary" onclick="nuevaValidacion()" style="margin-top:10px;">
                🔄 Validar Otro Negocio
            </button>
        </div>
    </div>

    <!-- PANTALLA 2: LEADS -->
    <div id="pantalla-leads" class="container hidden">
        <div class="card">
            <div class="card-title">📋 Mis Leads</div>
            <div class="leads-list" id="leads-list"></div>
        </div>
    </div>

    <!-- PANTALLA 3: DASHBOARD -->
    <div id="pantalla-dashboard" class="container hidden">
        <div class="card">
            <div class="card-title">📊 Dashboard</div>
            <div class="dashboard-grid" id="dashboard-kpis"></div>
        </div>
        <div class="card">
            <div class="card-title">🎯 Meta Mes 6</div>
            <div id="dashboard-metas"></div>
        </div>
    </div>

    <!-- NAVEGACIÓN INFERIOR -->
    <nav class="nav-bottom">
        <a href="#" class="nav-item active" onclick="mostrarPantalla('validador')">
            <span>🔍</span>Validar
        </a>
        <a href="#" class="nav-item" onclick="mostrarPantalla('leads')">
            <span>📋</span>Leads
        </a>
        <a href="#" class="nav-item" onclick="mostrarPantalla('dashboard')">
            <span>📊</span>KPIs
        </a>
    </nav>

    <script>
        const API_URL = window.location.origin;
        let currentLeadId = null;
        let currentPack = null;

        function mostrarPantalla(pantalla) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('pantalla-' + pantalla).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');

            if (pantalla === 'leads') cargarLeads();
            if (pantalla === 'dashboard') cargarDashboard();
        }

        async function validar() {
            const nombre = document.getElementById('nombre_negocio').value;
            const tipo = document.getElementById('tipo_negocio').value;

            if (!nombre || !tipo) {
                alert('Completa nombre y tipo de negocio');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultado').style.display = 'none';

            const data = {
                nombre_negocio: nombre,
                tipo_negocio: tipo,
                nombre_dueno: document.getElementById('nombre_dueno').value,
                telefono: document.getElementById('telefono').value,
                usa_whatsapp: parseInt(document.querySelector('input[name="wa"]:checked').value),
                en_google_maps: parseInt(document.querySelector('input[name="gm"]:checked').value),
                consultas_diarias: parseInt(document.querySelector('input[name="q"]:checked').value),
                competidores_digitalizados: parseInt(document.querySelector('input[name="comp"]:checked').value),
                dueno_smartphone: parseInt(document.querySelector('input[name="phone"]:checked').value),
                notas: document.getElementById('notas').value
            };

            try {
                const res = await fetch(`${API_URL}/api/validar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                currentLeadId = result.lead_id;
                currentPack = result.pack;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultado').style.display = 'block';

                document.getElementById('score-circle').textContent = result.score + '/10';
                document.getElementById('score-label').textContent = result.accion;

                let detailsHtml = '';
                for (const [key, val] of Object.entries(result.detalles)) {
                    detailsHtml += `<div class="score-detail">${val}</div>`;
                }
                document.getElementById('score-details').innerHTML = detailsHtml;

                document.getElementById('pack-name').textContent = result.pack_nombre;
                document.getElementById('pack-price').textContent = result.precio_entrada + ' MAD';
                document.getElementById('pack-mes').textContent = '+ ' + result.precio_mantenimiento + ' MAD/mes';

                document.getElementById('speech-box').textContent = '"' + result.speech + '"';

                const accionClass = result.score >= 8 ? 'accion-ideal' : result.score >= 5 ? 'accion-bueno' : 'accion-basico';
                document.getElementById('accion-container').innerHTML = 
                    `<span class="accion-tag ${accionClass}">${result.siguiente_paso}</span>`;

                window.scrollTo({ top: document.getElementById('resultado').offsetTop - 20, behavior: 'smooth' });

            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                alert('Error: ' + err.message);
            }
        }

        async function generarCotizacion() {
            if (!currentLeadId) return;

            const btn = event.target;
            btn.textContent = '⏳ Generando...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/api/cotizar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lead_id: currentLeadId, pack: currentPack })
                });
                const result = await res.json();

                btn.textContent = '✅ Cotización Generada';

                // Abrir cotización en nueva pestaña
                window.open(API_URL + result.url_html, '_blank');

                // Compartir por WhatsApp
                const msg = `Hola! Te envío la propuesta personalizada para tu negocio. Inversión: ${result.precio_entrada} MAD + ${result.precio_mantenimiento} MAD/mes. ¿Te parece si hablamos 5 minutos?`;
                const waUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;

                setTimeout(() => {
                    if (confirm('¿Compartir cotización por WhatsApp?')) {
                        window.open(waUrl, '_blank');
                    }
                }, 500);

            } catch (err) {
                btn.textContent = '❌ Error';
                alert('Error: ' + err.message);
            }
        }

        function nuevaValidacion() {
            document.getElementById('resultado').style.display = 'none';
            document.querySelectorAll('.form-input, .form-select').forEach(el => el.value = '');
            document.querySelectorAll('input[type="radio"]').forEach(el => el.checked = false);
            document.getElementById('wa2').checked = true;
            document.getElementById('gm0').checked = true;
            document.getElementById('q0').checked = true;
            document.getElementById('comp1').checked = true;
            document.getElementById('phone2').checked = true;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function cargarLeads() {
            const list = document.getElementById('leads-list');
            list.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                const res = await fetch(`${API_URL}/api/leads`);
                const data = await res.json();

                if (data.leads.length === 0) {
                    list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;">No hay leads registrados aún</p>';
                    return;
                }

                list.innerHTML = data.leads.map(lead => {
                    const scoreColor = lead.score >= 8 ? 'background:rgba(16,185,129,0.2);color:#10b981;' : 
                                      lead.score >= 5 ? 'background:rgba(245,158,11,0.2);color:#f59e0b;' : 
                                      'background:rgba(239,68,68,0.2);color:#ef4444;';
                    const estadoClass = 'estado-' + lead.estado;
                    return `
                        <div class="lead-item" onclick="verLead('${lead.id}')">
                            <div class="lead-header">
                                <span class="lead-name">${lead.nombre_negocio}</span>
                                <span class="lead-score" style="${scoreColor}">${lead.score}/10</span>
                            </div>
                            <div class="lead-info">${lead.tipo_negocio.replace('_', ' ')} | ${lead.telefono || 'Sin teléfono'}</div>
                            <span class="lead-estado ${estadoClass}">${lead.estado}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                list.innerHTML = '<p style="color:var(--danger);">Error cargando leads</p>';
            }
        }

        async function cargarDashboard() {
            const kpiContainer = document.getElementById('dashboard-kpis');
            const metasContainer = document.getElementById('dashboard-metas');

            try {
                const res = await fetch(`${API_URL}/api/dashboard`);
                const data = await res.json();

                kpiContainer.innerHTML = `
                    <div class="kpi-card"><div class="kpi-value">${data.kpi.total_leads}</div><div class="kpi-label">Total Leads</div></div>
                    <div class="kpi-card"><div class="kpi-value">${data.kpi.clientes_cerrados}</div><div class="kpi-label">Cerrados</div></div>
                    <div class="kpi-card"><div class="kpi-value">${data.kpi.clientes_activos}</div><div class="kpi-label">Activos</div></div>
                    <div class="kpi-card"><div class="kpi-value">${data.kpi.tasa_cierre_porciento}%</div><div class="kpi-label">Tasa Cierre</div></div>
                    <div class="kpi-card"><div class="kpi-value">${data.kpi.ingresos_entrada_total} MAD</div><div class="kpi-label">Ingresos Entrada</div></div>
                    <div class="kpi-card"><div class="kpi-value">${data.kpi.ingresos_recurrentes_mes} MAD</div><div class="kpi-label">Recurrentes/Mes</div></div>
                `;

                metasContainer.innerHTML = `
                    <div style="margin-bottom:15px;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                            <span>Clientes: ${data.meta_mes_6.progreso_clientes}%</span>
                            <span>${data.kpi.clientes_activos}/40</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${data.meta_mes_6.progreso_clientes}%"></div></div>
                    </div>
                    <div>
                        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                            <span>Ingresos: ${data.meta_mes_6.progreso_ingresos}%</span>
                            <span>${data.kpi.ingresos_recurrentes_mes}/10,000 MAD</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${data.meta_mes_6.progreso_ingresos}%"></div></div>
                    </div>
                `;
            } catch (err) {
                kpiContainer.innerHTML = '<p style="color:var(--danger);">Error cargando dashboard</p>';
            }
        }

        function verLead(id) {
            window.open(`${API_URL}/api/leads/${id}`, '_blank');
        }
    </script>
</body>
</html>
